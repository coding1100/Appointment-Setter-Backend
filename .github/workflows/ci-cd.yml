name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USERNAME }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          port: ${{ secrets.PROD_VPS_PORT || 22 }}
          timeout: 30s
          command_timeout: 15m
          script: |
            set -e

            cd ${{ secrets.PROD_VPS_DEPLOY_PATH }}

            echo "Pulling latest code..."
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "Building Docker images..."
            export COMPOSE_BAKE=false
            docker compose build --no-cache
            docker compose up -d --remove-orphans

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment complete. Container status:"
            docker compose ps

  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Deploy to Development VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_VPS_HOST }}
          username: ${{ secrets.DEV_VPS_USERNAME }}
          key: ${{ secrets.DEV_VPS_SSH_KEY }}
          port: ${{ secrets.DEV_VPS_PORT || 22 }}
          timeout: 30s
          command_timeout: 60m
          script: |
            set -e

            cd ${{ secrets.DEV_VPS_DEPLOY_PATH }}

            echo "Pulling latest code..."
            git fetch origin dev
            git checkout dev || git checkout -b dev
            git reset --hard origin/dev

            echo "Building Docker images..."
            export COMPOSE_BAKE=false
            docker compose build --no-cache
            docker compose up -d --remove-orphans

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment complete. Container status:"
            docker compose ps
