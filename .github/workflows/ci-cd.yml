name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]

env:
  DOCKER_IMAGE: umairmalick/appointment-setter-backend
  PYTHON_VERSION: "3.11"

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 SINGLE, CACHE-SAFE BUILD STEP
      - name: Build and push Docker image (NO STALE DEPS)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true

          # 🔥 FORCE FULL REBUILD (DEPENDENCIES INCLUDED)
          no-cache: true

          # 🔥 CACHE BUSTER (even if no-cache removed later)
          build-args: |
            BUILD_TIME=${{ github.sha }}

          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.ref == 'refs/heads/main' && 'latest' || 'dev' }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

          labels: |
            org.opencontainers.image.title=Appointment Setter Backend
            org.opencontainers.image.description=Backend API + Voice Worker (LiveKit)
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.environment=${{ github.ref_name }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USERNAME }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          port: ${{ secrets.PROD_VPS_PORT || 22 }}
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e

            cd ${{ secrets.PROD_VPS_DEPLOY_PATH || '/root/appointment-setter' }}

            git fetch origin main
            git checkout main || git checkout -b main
            git reset --hard origin/main

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
              -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull ${{ env.DOCKER_IMAGE }}:latest

            export DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}
            export IMAGE_TAG=latest

            docker compose down --remove-orphans
            docker compose pull
            docker compose up -d --force-recreate

            docker image prune -f
            docker compose ps

  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Deploy to Development VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_VPS_HOST }}
          username: ${{ secrets.DEV_VPS_USERNAME }}
          key: ${{ secrets.DEV_VPS_SSH_KEY }}
          port: ${{ secrets.DEV_VPS_PORT || 22 }}
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e

            cd ${{ secrets.DEV_VPS_DEPLOY_PATH || '/root/appointment-setter' }}

            git fetch origin dev
            git checkout dev || git checkout -b dev
            git reset --hard origin/dev

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
              -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull ${{ env.DOCKER_IMAGE }}:dev

            export DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}
            export IMAGE_TAG=dev

            docker compose down --remove-orphans
            docker compose pull
            docker compose up -d --force-recreate

            docker image prune -f
            docker compose ps
