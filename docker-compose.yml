services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: appointment-setter-backend:latest
    container_name: appointment-setter-backend
    restart: unless-stopped
    ports:
      - "8001:8000"

    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      API_HOST: 0.0.0.0
      API_PORT: 8000

      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-appointment_setter}


      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_SIP_DOMAIN: ${LIVEKIT_SIP_DOMAIN}

      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WEBHOOK_BASE_URL: ${TWILIO_WEBHOOK_BASE_URL}

      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ELEVEN_API_KEY: ${ELEVEN_API_KEY}
      AGENT_VOICE: ${AGENT_VOICE}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_STARTTLS: ${MAIL_STARTTLS}
      MAIL_SSL_TLS: ${MAIL_SSL_TLS}
      USE_CREDENTIALS: ${USE_CREDENTIALS}
      VALIDATE_CERTS: ${VALIDATE_CERTS}

      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}

      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}

      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}

    env_file:
      - .env

    volumes:
      - ./.env:/app/.env:ro
      - ./app/static:/app/app/static:ro

    networks:
      - app-network

    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

    # Backend runs FastAPI server, not LiveKit worker
    entrypoint: []
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: appointment-setter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    networks:
      - app-network

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: appointment-setter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appointment_setter}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-appointment_setter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  voice-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: appointment-setter-backend:latest
    # Do not pin container_name so this service can be scaled horizontally:
    # docker compose up -d --scale voice-worker=3
    restart: unless-stopped

    # Required: inference subprocess runs as root
    user: root

    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO

      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-appointment_setter}


      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_SIP_DOMAIN: ${LIVEKIT_SIP_DOMAIN}

      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WEBHOOK_BASE_URL: ${TWILIO_WEBHOOK_BASE_URL}

      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ELEVEN_API_KEY: ${ELEVEN_API_KEY}
      AGENT_VOICE: ${AGENT_VOICE}

      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}

      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}

      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}

      # HuggingFace cache configuration
      HF_HOME: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface

      # Disable offline mode to allow fallback downloads if needed
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"

      # VAD + Turn Detector performance
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"

    volumes:
      - ./.env:/app/.env:ro

    networks:
      - app-network

    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

    entrypoint: []
    command: ["python", "run_voice_worker.py", "start"]

    healthcheck:
      test: ["CMD-SHELL", "pgrep -f run_voice_worker.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
