services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: appointment-setter-backend:latest
    container_name: appointment-setter-backend
    restart: unless-stopped
    ports:
      - "8001:8000"

    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      API_HOST: 0.0.0.0
      API_PORT: 8000

      REDIS_URL: redis://redis:6379/0

      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}

      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_SIP_DOMAIN: ${LIVEKIT_SIP_DOMAIN}

      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WEBHOOK_BASE_URL: ${TWILIO_WEBHOOK_BASE_URL}

      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ELEVEN_API_KEY: ${ELEVEN_API_KEY}
      AGENT_VOICE: ${AGENT_VOICE}

      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}

      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}

      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}

    env_file:
      - .env

    volumes:
      - ./.env:/app/.env:ro
      - ./app/static:/app/app/static:ro

    networks:
      - app-network

    depends_on:
      - redis


  redis:
    image: redis:7-alpine
    container_name: appointment-setter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    networks:
      - app-network

    command: redis-server --appendonly yes


  voice-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: appointment-setter-backend:latest
    container_name: appointment-setter-voice-worker
    restart: unless-stopped

    # 🔥 REQUIRED: inference subprocess runs as root
    user: root

    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO

      REDIS_URL: redis://redis:6379/0

      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}

      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_SIP_DOMAIN: ${LIVEKIT_SIP_DOMAIN}

      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WEBHOOK_BASE_URL: ${TWILIO_WEBHOOK_BASE_URL}

      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ELEVEN_API_KEY: ${ELEVEN_API_KEY}
      AGENT_VOICE: ${AGENT_VOICE}

      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}

      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}

      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}

      # 🔥 HuggingFace cache configuration
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface
      
      # Disable offline mode to allow fallback downloads if needed
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"

      # 🔥 VAD + Turn Detector performance
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"

    volumes:
      - ./.env:/app/.env:ro

      # ✅ Mount HuggingFace cache as a named volume for persistence
      # This ensures the model downloaded during build is available at runtime
      - hf-cache:/root/.cache/huggingface

    networks:
      - app-network

    depends_on:
      - redis

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G

    entrypoint: []
    command: ["python", "run_voice_worker.py", "start"]

    healthcheck:
      test: ["CMD-SHELL", "pgrep -f voice_worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


networks:
  app-network:
    driver: bridge


volumes:
  redis-data:
  hf-cache:
    # Optional: specify driver options for better performance
    driver: local